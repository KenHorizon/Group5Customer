<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/BeyondHorizonPatreon/images/icon.png">
    <title>Beyond Horizon: Stars | Login</title>
    <link rel="stylesheet" href="css/style.css"> <!-- CSS SCRIPT HANDLE CUSTOMIZED ADDITIONS OF HTML -->

</head>
<body>
<!--
 HEADER OF THE SITE THIS IT'S APPLY ON EVERY SITE OF THIS [CTRL + C AND V]
 -->
<div class="page-section">
    <img class="header" src="images/title.png" alt="Beyond Horizon: Stars - Patreon">
    <div class="page-button-body page-button-left">
        <a class="font-white button-0" href="Home.html">Home</a>
        <a class="font-white button-0" href="About.html">About</a>
    </div>
</div>
<br>
<div class="main">
    <div class="background"  style="margin: 1% 35%">
        <div class="border" >
            <div class="center-text font-size font-white">
                <p>Login</p>
                <form action="Account.html" method="POST">
                    <div>
                        <label for="fname">Email:</label>
                        <input type="text" for="fname" id="fname" name="fname" placeholder="Username/Email" required>
                    </div>
                    <br>
                    <div>
                        <label for="lname">Password:</label>
                        <input type="text" for="lname" id="lname" name="lname" placeholder="Password" required>


                    </div>
                    <div style="font-size: 80%; margin:10px;">
                        <a>Don't have account yet?</a>
                        <a href="CreateAccount.html">Click Here</a>
                    </div>
                    <br>
                    <div>
                        <button type="submit">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
